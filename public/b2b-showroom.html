<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더프라임다온 - B2B 프리미엄 쇼룸 (플랫폼 충돌 방지판)</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif; }
    body { background-color: #f5f5f5; color: #333; overflow-x: hidden; padding: 40px 20px; }

    .showroom-header { text-align: center; margin-bottom: 50px; }
    .showroom-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    .showroom-header p { color: #666; font-size: 16px; margin-bottom: 30px; }
    
    .filter-tabs { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; }
    .filter-btn { padding: 10px 24px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 30px; font-weight: 500; font-size: 15px; transition: all 0.3s; }
    .filter-btn:hover, .filter-btn.active { background: #111; color: #fff; border-color: #111; }

    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; transition: all 0.4s ease; }
    .product-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border: 1px solid #eee; position: relative; z-index: 10; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
    .product-img-wrap { width: 100%; height: 280px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; overflow: hidden; pointer-events: none; }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { padding: 20px; pointer-events: none; }
    .category-label { font-size: 12px; color: #8b7355; font-weight: 600; margin-bottom: 8px; display: block; }
    .product-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #111; }
    .b2b-tag { display: inline-block; font-size: 11px; background: #f0ece1; color: #8b7355; padding: 4px 12px; border-radius: 20px; font-weight: 600; margin-right: 5px; }

    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); opacity: 0; visibility: hidden; transition: all 0.4s ease; z-index: 1000; }
    .drawer-overlay.active { opacity: 1; visibility: visible; }
    
    .side-drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 550px; height: 100vh; background: #fff; z-index: 1001; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; }
    .drawer-overlay.active + .side-drawer { right: 0; }
    
    .drawer-header { padding: 20px 30px; display: flex; justify-content: flex-end; position: sticky; top: 0; background: #fff; z-index: 10; border-bottom: 1px solid #f0f0f0; }
    .close-btn { background: none; border: none; font-size: 32px; cursor: pointer; color: #333; line-height: 1; transition: color 0.2s; }
    .close-btn:hover { color: #000; }

    .drawer-content { padding: 0 40px 40px; }
    .drawer-img { width: 100%; height: 400px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; overflow: hidden; border-radius: 8px;}
    .drawer-img img { width: 100%; height: 100%; object-fit: cover; }
    
    .drawer-cat { font-size: 13px; color: #8b7355; font-weight: 600; margin-bottom: 10px; }
    .drawer-title { font-size: 28px; margin-bottom: 30px; color: #111; letter-spacing: -0.5px; line-height: 1.3;}
    
    .info-section { margin-bottom: 25px; padding-bottom: 25px; border-bottom: 1px solid #eee; }
    .info-label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
    .info-text { font-size: 15px; color: #333; line-height: 1.6; }
    
    .drawer-footer-msg { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 30px; background: #f8f8f8; padding: 20px; border-left: 3px solid #111; border-radius: 0 8px 8px 0;}
    
    .btn-wrap { display: flex; gap: 12px; flex-direction: column; }
    .btn-dark { background: #111; color: #fff; text-align: center; padding: 18px; text-decoration: none; font-weight: 600; border-radius: 6px; transition: background 0.2s; font-size: 15px; display: block;}
    .btn-dark:hover { background: #333; }
    .btn-light { background: #fff; color: #111; border: 1px solid #ddd; text-align: center; padding: 18px; text-decoration: none; font-weight: 600; border-radius: 6px; transition: all 0.2s; font-size: 15px; display: block;}
    .btn-light:hover { background: #f5f5f5; border-color: #ccc; }
</style>
</head>
<body>

<div class="showroom-header">
    <h1>Collections</h1>
    <p>더프라임다온의 하이엔드 제조 역량을 확인해 보세요.</p>
    
    <div class="filter-tabs" id="filter-tabs">
        <button class="filter-btn active" data-filter="all">전체 보기</button>
        <button class="filter-btn" data-filter="tech">테크 에센셜</button>
        <button class="filter-btn" data-filter="bag">가방 & 파우치</button>
        <button class="filter-btn" data-filter="personal">퍼스널 레더 굿즈</button>
        <button class="filter-btn" data-filter="life">라이프스타일 소품</button>
    </div>
</div>

<div class="grid-container" id="main-grid"></div>

<div class="drawer-overlay" id="overlay"></div>
<div class="side-drawer" id="drawer">
    <div class="drawer-header">
        <button class="close-btn" id="close-drawer-btn">×</button>
    </div>
    <div class="drawer-content">
        <div class="drawer-img"><img id="d-img" src="" alt="Detail" onerror="this.src='https://via.placeholder.com/600x600/f5f5f5/999?text=Image+Loading'"></div>
        <div class="drawer-cat" id="d-cat"></div>
        <h2 class="drawer-title" id="d-title"></h2>
        
        <div class="info-section">
            <div class="info-label">Craftsmanship & Details</div>
            <div class="info-text">견고한 마감 처리, 최고급 소재 적용 및 정밀 봉제. 내구성과 심미성을 동시에 충족하는 하이엔드 공정.</div>
        </div>
        <div class="info-section">
            <div class="info-label">Customization Option</div>
            <div class="info-text">가죽 소재 및 컬러 변경, 기업 로고 커스텀 각인(불박/금박), 패키지 구성 등 100% 맞춤형 OEM/ODM 양산이 가능합니다.</div>
        </div>
        
        <div class="drawer-footer-msg">
            본 제품은 더프라임다온의 완벽한 마감 퀄리티를 증명하는 레퍼런스 모델입니다.
        </div>
        
        <div class="btn-wrap">
            <a href="#" class="btn-dark" id="btn-inquiry">💡 이 스타일로 제작 단가 문의하기</a>
            <a href="#" class="btn-light" id="btn-portfolio">📁 제조 포트폴리오 확인하기</a>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const rawData = [
        ["Ai_Daon_0.png", "tech", "테크 에센셜 | 맥세이프 카드홀더", "맥세이프 카드 지갑 (스탠드/밴드형)"],
        ["Ai_Daon_1.png", "tech", "테크 에센셜 | 디지털/웨어러블 기어", "에어팟 케이스"],
        ["Ai_Daon_2.png", "life", "라이프스타일 소품 | 키 케이싱 & 키링", "자동차 스마트키 홀더/케이스"],
        ["Ai_Daon_4.png", "personal", "퍼스널 레더 굿즈 | 오피스 스테이셔너리", "가죽 다이어리 커버 / 바인더"],
        ["Ai_Daon_6.png", "bag", "가방 & 파우치 | 라이프스타일 파우치", "다목적 소형 미니 파우치"],
        ["Ai_Daon_9.png", "bag", "가방 & 파우치 | 데일리 & 캐주얼 백", "미니 체인 백 / 사첼백 / 크로스백"],
        ["Ai_Daon_12.png", "tech", "테크 에센셜 | 스마트폰 가죽 케이스", "아이폰 프리미엄 가죽 케이스"],
        ["Ai_Daon_25.png", "personal", "퍼스널 레더 굿즈 | 트래블 액세서리", "러기지텍"],
        ["Ai_Daon_26.png", "life", "라이프스타일 소품 | 골프 액세서리", "골프 공 파우치"]
    ];

    const products = rawData.map((d, index) => {
        let tag = "";
        if(d[2].includes("오피스") || d[2].includes("트래블") || d[3].includes("명함")) tag = "기업 판촉용";
        else if(d[2].includes("골프") || d[2].includes("지갑") || d[3].includes("프리미엄")) tag = "VIP 웰컴키트";
        else if(d[2].includes("스마트키")) tag = "딜러사 판촉물";
        
        return { id: index, img: d[0], category: d[1], catName: d[2], title: d[3], b2bTag: tag };
    });

    const grid = document.getElementById('main-grid');
    const overlay = document.getElementById('overlay');
    
    function closeDrawerAction() {
        overlay.classList.remove('active');
        grid.style.transform = 'scale(1)';
        grid.style.opacity = '1';
    }

    document.getElementById('close-drawer-btn').addEventListener('click', closeDrawerAction);
    document.getElementById('btn-inquiry').addEventListener('click', function(e){ e.preventDefault(); closeDrawerAction(); });
    document.getElementById('btn-portfolio').addEventListener('click', function(e){ e.preventDefault(); closeDrawerAction(); });
    overlay.addEventListener('click', function(e) {
        if(e.target === overlay) closeDrawerAction();
    });

    function renderProducts(filterStr) {
        grid.innerHTML = '';
        products.forEach(p => {
            if (filterStr === 'all' || p.category === filterStr) {
                const tagHtml = p.b2bTag ? `<div class="b2b-tag">${p.b2bTag}</div>` : '';
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img-wrap"><img src="${p.img}" alt="${p.title}" onerror="this.src='https://via.placeholder.com/400x400/f5f5f5/999?text=Image+Loading'"></div>
                    <div class="product-info">
                        <span class="category-label">${p.catName.split('|')[0].trim()}</span>
                        <h3 class="product-title">${p.title}</h3>
                        ${tagHtml}
                    </div>
                `;
                
                // ★★★ 핵심 수정 부분: 안티그라비티의 링크 이동을 강제로 막습니다 ★★★
                card.addEventListener('click', function(e) {
                    e.preventDefault();       // a 태그나 기본 링크 이동 성질 차단
                    e.stopPropagation();      // 부모 요소의 클릭 이벤트까지 번지는 것 차단
                    
                    document.getElementById('d-img').src = p.img;
                    document.getElementById('d-cat').innerText = p.catName;
                    document.getElementById('d-title').innerText = p.title;
                    overlay.classList.add('active');
                    grid.style.transform = 'scale(0.98)';
                    grid.style.opacity = '0.7';
                });
                
                grid.appendChild(card);
            }
        });
    }

    const tabs = document.querySelectorAll('.filter-btn');
    tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            tabs.forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            renderProducts(e.target.getAttribute('data-filter'));
        });
    });

    renderProducts('all');
});
</script>
</body>
</html>
